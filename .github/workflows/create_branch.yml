name: Create a release branch

on:
  workflow_dispatch:
    inputs:
      oarepo-version:
        description: "Exact oarepo version to use (optional; defaults to the latest for the branch's major version)"
        required: false
        type: string

jobs:
  start:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Init tools
        uses: ./.github/actions/init-tools

      - name: Detect InvenioRDM version from branch
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          VERSION="${BRANCH#rdm-}"
          if [ "$VERSION" = "$BRANCH" ]; then
            echo "::error::Branch '$BRANCH' does not match the expected 'rdm-N' pattern."
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run oarepo-app-build setup
        env:
          OAREPO_VERSION: ${{ inputs.oarepo-version }}
        run: |
          ARGS=("${{ steps.version.outputs.value }}")
          if [ -n "$OAREPO_VERSION" ]; then
            ARGS+=(--oarepo-version "$OAREPO_VERSION")
          fi
          oarepo-app-build setup "${ARGS[@]}"

      - name: Commit and push branch
        id: push
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git add -A
          git diff --staged --quiet || \
            git commit -m "chore: update to InvenioRDM ${{ steps.version.outputs.value }}"
          git push --set-upstream origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create or retrieve pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.push.outputs.branch }}"
          BASE="${{ github.event.repository.default_branch }}"
          # Reuse an existing open PR for this branch; ignore closed/merged ones.
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url' 2>/dev/null)
          if [ -z "$PR_URL" ] || [ "$PR_URL" = "null" ]; then
            PR_URL=$(gh pr create \
              --title "Update to InvenioRDM ${{ steps.version.outputs.value }}" \
              --body "$(printf 'Automated dependency update triggered by workflow dispatch.\n\n**InvenioRDM version:** `${{ steps.version.outputs.value }}`\n**Branch:** `%s`' "$BRANCH")" \
              --base "$BASE" \
              --head "$BRANCH")
          fi
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        run: |
          echo "## ✅ Setup complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **InvenioRDM version** | \`${{ steps.version.outputs.value }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ steps.push.outputs.branch }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Pull request** | ${{ steps.pr.outputs.url }} |" >> "$GITHUB_STEP_SUMMARY"
