name: Show Dependencies

on:
  workflow_dispatch:
    inputs:
      oarepo-version:
        description: "Exact oarepo version to use (optional; defaults to the latest for the branch's major version)"
        required: false
        type: string
      upgraded-packages:
        description: "Comma-separated list of packages to upgrade (e.g., oarepo-model,oarepo-ui)"
        required: false
        type: string

jobs:
  show-dependencies:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Init tools
        uses: ./.github/actions/init-tools

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Detect InvenioRDM version from branch
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          VERSION="${BRANCH#rdm-}"
          if [ "$VERSION" = "$BRANCH" ]; then
            echo "::error::Branch '$BRANCH' does not match the expected 'rdm-N' pattern."
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run oarepo-app-build build-dependency-tree
        env:
          OAREPO_VERSION: ${{ inputs.oarepo-version }}
          UPGRADED_PACKAGES: ${{ inputs.upgraded-packages }}
        run: |
          ARGS=("${{ steps.version.outputs.value }}")
          if [ -n "$OAREPO_VERSION" ]; then
            ARGS+=(--oarepo-version "$OAREPO_VERSION")
          fi
          if [ -n "$UPGRADED_PACKAGES" ]; then
            ARGS+=(--upgraded-packages "$UPGRADED_PACKAGES")
          fi
          oarepo-app-build build-dependency-tree "${ARGS[@]}"

      - name: Upload dependency artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-graphs
          path: output/
          if-no-files-found: warn

      - name: Prepare GitHub Pages content
        if: always()
        run: |
          mkdir -p pages
          touch pages/.nojekyll

          # Copy the generated interactive HTML report and its assets
          if [ -f "output/index.html" ]; then
            cp -r output/. pages/
            echo "✅ Copied interactive HTML report and assets"
          else
            echo "⚠️ No interactive HTML report found, creating basic page"
            echo "<html><body><h1>No report generated</h1></body></html>" > pages/index.html
          fi

          echo "--- output/ contents ---"
          ls -lR output/ || echo "(output/ not found)"
          echo "--- pages/ contents ---"
          ls -lR pages/

      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Write job summary
        if: always()
        run: |
          echo "## ✅ Dependency analysis complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **InvenioRDM version** | \`${{ steps.version.outputs.value }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ inputs.upgraded-packages }}" ]; then
            echo "| **Upgraded packages** | \`${{ inputs.upgraded-packages }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Generated files" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`output/index.html\` - Interactive HTML report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "📥 Download the artifacts from the workflow run to view the graphs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.deployment.outputs.page_url }}" ]; then
            echo "🌐 **View online:** ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
