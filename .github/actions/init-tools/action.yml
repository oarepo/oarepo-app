name: Init Tools
description: >
  Installs uv, Python 3.14, creates a dedicated tools virtualenv
  and installs the ./tools package into it.

outputs:
  venv-python:
    description: Path to the Python executable inside the tools venv
    value: ${{ steps.venv.outputs.python }}

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: false

    - name: Install Python 3.14
      shell: bash
      run: uv python install 3.14

    - name: Create tools venv
      id: venv
      shell: bash
      run: |
        uv venv --python 3.14 .venv-tools
        uv pip install --python .venv-tools/bin/python twine
        echo "python=${{ github.workspace }}/.venv-tools/bin/python" >> "$GITHUB_OUTPUT"

    - name: Install tools package
      shell: bash
      run: uv pip install --python .venv-tools/bin/python ./tools

    - name: Link the tools to a path
      shell: bash
      run: |
        # we do not want to expose the full venv path to the user
        # instead, we create a .bin directory and add it to PATH
        # and only add the tool itself to that directory
        # this way, the user can use `oarepo-app-build` and still
        # have separated python virtual environments if needed
        mkdir .bin
        ln -s $(pwd)/.venv-tools/bin/oarepo-app-build $(pwd)/.bin/oarepo-app-build
        ln -s $(pwd)/.venv-tools/bin/twine $(pwd)/.bin/twine
        echo "PATH=$(pwd)/.bin:$PATH" >> "$GITHUB_ENV"

    - name: Set up cesnet pypi registry for UV
      shell: bash
      run: |
        echo "UV_EXTRA_INDEX_URL=https://gitlab.cesnet.cz/api/v4/projects/1408/packages/pypi/simple" >> "$GITHUB_ENV"
        echo "UV_PRERELEASE=allow" >> "$GITHUB_ENV"
        echo "PIP_EXTRA_INDEX_URL=https://gitlab.cesnet.cz/api/v4/projects/1408/packages/pypi/simple" >> "$GITHUB_ENV"
